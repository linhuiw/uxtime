      <div class="article-body reveal" style="margin-top:clamp(1.5rem,1rem + 2vw,2.5rem)">
        <p>UXTIME Design携手DHouse共同打造一款全新智能家庭控制系统，历时三个月，在用户场景分析基础上，我们尝试几十套交互方式，凸显应用在智能控制和用户体验的特点，开创国内智能家居系统体验新局面。新的系统主要应用在ios、桌面等平台，我们为Dcontrols量身打造一款多角度交互方式：鸟瞰架构，将房间所有信息直观展现在用户眼前，使用户减少学习时间，只需将房间旋转缩放即可找到相应的控件。设计使得产品用户体验变得更贴心，使用更高效，同时让团队在智能家居设计领域成为专业先行者，此解决方案最终获得了国际体验设计协会IXDC授予的优秀作品奖。</p>
