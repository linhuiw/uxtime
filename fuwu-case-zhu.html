      <div class="article-body reveal" style="margin-top:clamp(1.5rem,1rem + 2vw,2.5rem)">
        <p>产品智能管理平台一直处于一种重要但非核心的业务领域，但受其操作问题困扰的企业不再少数。三菱机电的空调测试系统在经历多年的技术更新后，人机交互界面并未及时得到提升，已经对操作人员的工作效率和商业成本形成的负面影响。UXTIME Design受到独家邀请，参与了此次管理平台的用户体验设计。在设计过程中，设计团队通过详细的用户访谈、焦点小组和用户画像，明确了典型用户的特点，定制了相应的交互流程，并通过对测试系统的视觉风格的探索，重新构建的操作系统的设计语言，产品最终顺利落地，并获得用户的好评。</p>
      </div>
