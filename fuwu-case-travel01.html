      <div class="article-body reveal" style="margin-top:clamp(1.5rem,1rem + 2vw,2.5rem)">
        <p>UXTIME Design受到金通科技的邀请，参与了公司新一代共享出行的产品设计，并主持了旗下共享出行品牌的用户体验设计。以秩序出行为宗旨，以体验设计为手段，通过优化城市居民的每一次出行任务和操作行为，来提高出行工具的周转率，降低公共空间的无序占有率，并以此来反思人们出行的意义。我们通过专业的设计方法重新归纳出了软件和硬件产品的设计语言，设计方案从诸多同类型产品中脱颖而出，获得年轻群体的关注和市场的认可，作品荣幸地获得央视报道，并协助金通科技获得英国国宝级奖项“艾希顿”可持续交通项目奖。</p>
